<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Pump Boost Admin</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card">
      <h1>Admin Login</h1>
      <p class="muted">Pump Boost Bot control panel</p>

      {% if password_missing %}
      <div class="alert alert-bad">
        <strong>ADMIN_PANEL_PASSWORD</strong> is not set in your environment.
        Add it to <code>.env</code> and restart the admin server.
      </div>
      {% endif %}

      {% if error %}
      <div class="alert alert-bad">Invalid password.</div>
      {% endif %}

      <form method="post" action="/login" style="margin-top:1rem;">
        <label class="muted" for="password">Password</label><br>
        <input id="password" name="password" type="password" required style="width:100%;margin:0.5rem 0 1rem;">
        <button class="btn btn-primary" type="submit" {% if password_missing %}disabled{% endif %}>Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
