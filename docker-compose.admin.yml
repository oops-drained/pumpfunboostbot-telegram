services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_MODE: admin
      ADMIN_PANEL_HOST: 0.0.0.0
      ADMIN_PANEL_PORT: "8080"
      DATA_DIR: /app/data
    volumes:
      - admin-data:/app/data

volumes:
  admin-data:
